<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc">
  <title id="title">Drift processing model</title>
  <desc id="desc">A flowchart showing how Drift turns context and user signals into an intervention decision.</desc>

  <defs>
    <linearGradient id="panelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd1ea" />
      <stop offset="100%" stop-color="#d9d1ff" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f6bff" />
      <stop offset="100%" stop-color="#ff72c2" />
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 L3,6 Z" fill="#6a4d78" />
    </marker>
  </defs>

  <rect x="36" y="24" width="928" height="472" rx="20" fill="#fff7ff" stroke="#e0c2dc" />

  <g font-family="Trebuchet MS, Arial, sans-serif" fill="#221126" text-anchor="middle">
    <g>
      <rect x="70" y="95" width="190" height="95" rx="14" fill="url(#panelGradient)" stroke="#b18fc1" />
      <text x="165" y="120" font-size="16" font-weight="700">Input Signals</text>
      <text x="165" y="145" font-size="12">Transactions, wallet events,</text>
      <text x="165" y="160" font-size="12">calendar, mood check-in</text>
      <text x="165" y="175" font-size="12">and spending frequency</text>

      <rect x="330" y="95" width="190" height="95" rx="14" fill="url(#panelGradient)" stroke="#b18fc1" />
      <text x="425" y="120" font-size="16" font-weight="700">Feature Engine</text>
      <text x="425" y="145" font-size="12">Normalize amount, urgency,</text>
      <text x="425" y="160" font-size="12">time-of-day, fatigue score,</text>
      <text x="425" y="175" font-size="12">context embeddings</text>

      <rect x="590" y="95" width="190" height="95" rx="14" fill="url(#panelGradient)" stroke="#b18fc1" />
      <text x="685" y="120" font-size="16" font-weight="700">Risk Predictor</text>
      <text x="685" y="145" font-size="12">Hybrid model mixes</text>
      <text x="685" y="160" font-size="12">rules + lightweight ML</text>
      <text x="685" y="175" font-size="12">to score impulse chance</text>

      <rect x="840" y="95" width="110" height="95" rx="14" fill="url(#accentGradient)" stroke="#6d63bf" />
      <text x="895" y="130" font-size="16" font-weight="700" fill="#ffffff">Decision</text>
      <text x="895" y="150" font-size="12" fill="#ffffff">90% threshold,</text>
      <text x="895" y="165" font-size="12" fill="#ffffff">delay and hold rules</text>
    </g>

    <line x1="260" y1="142" x2="330" y2="142" stroke="#6a4d78" stroke-width="4" marker-end="url(#arrow)" />
    <line x1="520" y1="142" x2="590" y2="142" stroke="#6a4d78" stroke-width="4" marker-end="url(#arrow)" />
    <line x1="780" y1="142" x2="840" y2="142" stroke="#6a4d78" stroke-width="4" marker-end="url(#arrow)" />

    <g>
      <rect x="320" y="285" width="190" height="95" rx="14" fill="#fff1fb" stroke="#c09ec0" />
      <text x="415" y="313" font-size="15" font-weight="700">Intervention Layer</text>
      <text x="415" y="336" font-size="12">Delay timer, reflection prompt,</text>
      <text x="415" y="351" font-size="12">budget-safe alternatives</text>
      <text x="415" y="366" font-size="12">and soft lock option</text>

      <rect x="620" y="285" width="190" height="95" rx="14" fill="#fff1fb" stroke="#c09ec0" />
      <text x="715" y="313" font-size="15" font-weight="700">Learning Loop</text>
      <text x="715" y="336" font-size="12">User response and outcomes</text>
      <text x="715" y="351" font-size="12">feed model calibration</text>
      <text x="715" y="366" font-size="12">for better precision</text>
    </g>

    <line x1="895" y1="190" x2="895" y2="260" stroke="#6a4d78" stroke-width="4" marker-end="url(#arrow)" />
    <line x1="895" y1="260" x2="415" y2="260" stroke="#6a4d78" stroke-width="4" marker-end="url(#arrow)" />
    <line x1="415" y1="380" x2="715" y2="380" stroke="#6a4d78" stroke-width="4" marker-end="url(#arrow)" />
    <path d="M715 285 L715 220 L260 220 L260 190" fill="none" stroke="#6a4d78" stroke-width="4" marker-end="url(#arrow)" />
  </g>

  <g fill="#5a4567" font-family="Georgia, serif" text-anchor="middle">
    <text x="500" y="40" font-size="22" font-weight="700">Drift Processing Pipeline</text>
    <text x="500" y="70" font-size="14">Real-time inference with post-purchase feedback updates</text>
  </g>

  <g fill="#5a4567" font-family="Trebuchet MS, Arial, sans-serif" text-anchor="middle" opacity="0.9">
    <text x="165" y="255" font-size="12">Input stream</text>
    <text x="895" y="255" font-size="12">Decision output</text>
    <text x="415" y="450" font-size="12">Behavioral data + outcomes improve future alerts</text>
  </g>
</svg>
